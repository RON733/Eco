<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Bookings | G'SHOT ADMIN</title>
    <link rel="stylesheet" href="../home/home.css">
    <link rel="stylesheet" href="admin.css">
    <script src="../js/auth-guard.js"></script>
    <!-- Supabase Cloud Database -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase-config.js"></script>
    <style>
        /* Prevent content flash before auth check */
        body {
            visibility: hidden;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .booking-card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 1.5rem;
            margin-top: 2rem;
        }

        .booking-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 1.5rem;
            position: relative;
            transition: transform 0.3s ease;
        }

        .booking-card:hover {
            transform: translateY(-5px);
            border-color: rgba(253, 216, 53, 0.2);
        }

        .booking-status {
            position: absolute;
            top: 1.5rem;
            right: 1.5rem;
        }

        .booking-details {
            margin-top: 1rem;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
        }

        .detail-label {
            color: rgba(255, 255, 255, 0.4);
        }

        .detail-value {
            font-weight: 600;
        }

        .booking-actions {
            margin-top: 1.5rem;
            display: flex;
            gap: 0.8rem;
        }

        .booking-tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 1rem;
        }

        .tab-btn {
            background: transparent;
            border: none;
            color: rgba(255, 255, 255, 0.5);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .tab-btn:hover {
            color: white;
            background: rgba(255, 255, 255, 0.05);
        }

        .tab-btn.active {
            color: var(--primary-yellow);
            background: rgba(253, 216, 53, 0.1);
        }
    </style>
</head>

<body>
    <div class="admin-container">
        <header class="admin-header">
            <div class="brand">
                <img src="../pic/logo.png" alt="Logo">
                <span class="brand-name">G'SHOT <span class="highlight">ADMIN</span></span>
            </div>
            <nav class="admin-nav">
                <a href="dashboard.html">Dashboard</a>
                <a href="orders.html">Orders</a>
                <a href="bookings.html" class="active">Bookings</a>
                <a href="inventory.html">Inventory</a>
                <a href="../main/index.html">View Store</a>
            </nav>
            <div class="admin-profile">
                <div class="notif-group">
                    <!-- Orders Notification -->
                    <div class="notif-item">
                        <div class="icon-btn" title="Orders">🛒<span class="dot"></span></div>
                        <div class="notif-dropdown">
                            <div class="dropdown-header">Recent Orders</div>
                            <div class="dropdown-list">
                                <!-- Loaded via JS -->
                            </div>
                            <a href="orders.html" class="view-all">View All Orders</a>
                        </div>
                    </div>

                    <!-- Bookings Notification -->
                    <div class="notif-item">
                        <div class="icon-btn" title="Bookings">📅<span class="dot"></span></div>
                        <div class="notif-dropdown">
                            <div class="dropdown-header">Event Bookings</div>
                            <div class="dropdown-list">
                                <!-- Loaded via JS -->
                            </div>
                            <a href="bookings.html" class="view-all">View All Bookings</a>
                        </div>
                    </div>
                </div>

                <div class="icon-btn" title="Settings">⚙️</div>
                <div class="user-avatar">
                    <img src="https://ui-avatars.com/api/?name=Admin&background=fdd835&color=000" alt="Admin">
                </div>
            </div>
        </header>

        <main class="dashboard-content">
            <div class="inventory-header">
                <div>
                    <div class="breadcrumb">HOME > BOOKINGS</div>
                    <h2>Event Bookings</h2>
                </div>
            </div>

            <div class="booking-tabs">
                <button class="tab-btn active" onclick="switchTab('pending')">New Requests</button>
                <button class="tab-btn" onclick="switchTab('confirmed')">Confirmed Bookings</button>
                <button class="tab-btn" onclick="switchTab('all')">All Bookings</button>
            </div>

            <div id="bookings-container" class="booking-card-grid">
                <!-- Loaded from JS -->
                <p style="grid-column: 1/-1; text-align: center;">Loading bookings...</p>
            </div>
        </main>
    </div>

    <script src="../js/admin-notifications.js"></script>
    <script>
        let currentFilter = 'pending';

        async function switchTab(status) {
            currentFilter = status;

            // Update UI
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
                if (status === 'all' && btn.innerText.toLowerCase().includes('all')) {
                    btn.classList.add('active');
                } else if (status === 'pending' && btn.innerText.toLowerCase().includes('new')) {
                    btn.classList.add('active');
                } else if (status === 'confirmed' && btn.innerText.toLowerCase().includes('confirmed')) {
                    btn.classList.add('active');
                }
            });

            fetchBookings();
        }

        async function fetchBookings() {
            const container = document.getElementById('bookings-container');
            container.innerHTML = '<p style="grid-column: 1/-1; text-align: center;">Loading bookings...</p>';

            try {
                let query = window.supabase
                    .from('bookings')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (currentFilter !== 'all') {
                    query = query.eq('status', currentFilter);
                }

                const { data, error } = await query;

                if (error) {
                    console.error("Supabase Error:", error);
                    if (error.code === 'PGRST204' || error.message.includes('column "status" does not exist')) {
                        container.innerHTML = `
                            <div style="grid-column: 1/-1; text-align: center; color: #ff4444; padding: 2rem; background: rgba(255,0,0,0.1); border-radius: 10px;">
                                <p style="font-weight: 700; font-size: 1.2rem;">Database Column Missing!</p>
                                <p style="margin: 1rem 0;">The 'status' column is missing from your 'bookings' table.</p>
                                <p style="font-size: 0.9rem;">Please add a column named <b>status</b> (type: text, default: 'pending') to your bookings table in Supabase.</p>
                            </div>
                        `;
                    } else {
                        throw error;
                    }
                    return;
                }

                if (data.length === 0) {
                    container.innerHTML = `<p style="grid-column: 1/-1; text-align: center; opacity: 0.5; padding: 2rem;">No ${currentFilter === 'all' ? '' : currentFilter} bookings found.</p>`;
                    return;
                }

                container.innerHTML = '';
                data.forEach(booking => {
                    const date = new Date(booking.event_date).toLocaleDateString('en-PH', {
                        weekday: 'long',
                        year: 'numeric',
                        month: 'long',
                        day: 'numeric'
                    });

                    const card = document.createElement('div');
                    card.className = 'booking-card';
                    card.innerHTML = `
                        <div class="booking-status">
                            <span class="badge ${booking.status || 'pending'}">${(booking.status || 'pending').toUpperCase()}</span>
                        </div>
                        <h4 style="margin-bottom: 0.5rem; font-size: 1.2rem;">${booking.service_type.toUpperCase()}</h4>
                        <p style="font-size: 0.8rem; color: var(--primary-yellow); font-weight: 700;">${date}</p>
                        
                        <div class="booking-details">
                            <div class="detail-row">
                                <span class="detail-label">Client Name</span>
                                <span class="detail-value">${booking.customer_name}</span>
                            </div>
                            <div class="detail-row">
                                <span class="detail-label">Email</span>
                                <span class="detail-value">${booking.customer_email}</span>
                            </div>
                            <div class="detail-row">
                                <span class="detail-label">Phone</span>
                                <span class="detail-value">${booking.phone || 'N/A'}</span>
                            </div>
                            <div class="detail-row">
                                <span class="detail-label">Guest Count</span>
                                <span class="detail-value">${booking.guests} Pax</span>
                            </div>
                        </div>

                        <div class="booking-actions">
                            ${booking.status !== 'confirmed' ? `<button class="btn-approve" style="flex:1" onclick="updateBookingStatus('${booking.id}', 'confirmed')">CONFIRM</button>` : ''}
                            <button class="btn-mark" style="flex:1" onclick="deleteBooking('${booking.id}')">DELETE</button>
                        </div>
                    `;
                    container.appendChild(card);
                });

            } catch (err) {
                console.error(err);
                container.innerHTML = '<p style="grid-column: 1/-1; text-align: center; color: #ff4444;">Failed to load bookings.</p>';
            }
        }

        async function updateBookingStatus(id, newStatus) {
            try {
                const { error } = await window.supabase
                    .from('bookings')
                    .update({ status: newStatus })
                    .eq('id', id);

                if (error) throw error;

                // Show success and move to confirmed tab
                alert("Booking Confirmed! Moving to Confirmed Bookings.");
                switchTab('confirmed');
            } catch (err) {
                alert("Error updating booking: " + err.message);
            }
        }

        async function deleteBooking(id) {
            if (!confirm("Delete this booking request?")) return;
            try {
                const { error } = await window.supabase
                    .from('bookings')
                    .delete()
                    .eq('id', id);

                if (error) throw error;
                fetchBookings();
            } catch (err) {
                alert("Error deleting booking: " + err.message);
            }
        }

        document.addEventListener('DOMContentLoaded', () => fetchBookings());
    </script>
</body>

</html>
